<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kitsune pop-up page</title>
    <meta charset="utf-8"/>
    <style>
        #windows-table {
            width: 100%;
            border-collapse: collapse;
            background-color: #f9f9f9;
            border: 1px solid #ccc;
        }

        #windows-table thead {
            position: sticky;
            top: 0;
            background-color: #e8e8e8;
        }

        #windows-table th {
            padding: 4px 8px;
            text-align: left;
            border-bottom: 2px solid #ccc;
            white-space: nowrap;
        }

        #windows-table th.sortable {
            cursor: pointer;
            user-select: none;
        }

        #windows-table th.sortable:hover {
            background-color: #d8d8d8;
        }

        #windows-table td {
            padding: 3px 8px;
            border-bottom: 1px solid #e0e0e0;
            vertical-align: middle;
        }

        #windows-table tbody tr:last-child td {
            border-bottom: none;
        }

        #windows-table tbody tr:hover {
            background-color: #eef;
        }

        #windows-table tbody tr.selected {
            background-color: #ddf;
        }

        #windows-table tbody tr.selected:hover {
            background-color: #ccf;
        }

        #windows-table th:nth-child(n+2),
        #windows-table td:nth-child(n+2) {
            width: 1px;
            white-space: nowrap;
        }

        #windows-table-wrapper {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #ccc;
        }

        .window-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px;
            display: inline-flex;
            align-items: center;
        }

        .window-btn img {
            width: 16px;
            height: 16px;
        }

        .window-btn:hover {
            background-color: #e0e0e0;
            border-radius: 2px;
        }

        body {
            min-width: 300px;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }

        #window-details {
            margin-top: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            background-color: #f9f9f9;
            border-radius: 4px;
            display: none;
        }

        #window-details.visible {
            display: block;
        }

        #window-details h4 {
            margin: 0 0 8px 0;
            color: #333;
        }

        #window-details-content {
            font-size: 11px;
        }

        .detail-row {
            margin-bottom: 4px;
        }

        .detail-label {
            font-weight: bold;
            display: inline-block;
            min-width: 60px;
        }

        .tabs-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 4px;
            font-size: 10px;
        }

        .tabs-table thead {
            background-color: #e8e8e8;
        }

        .tabs-table th {
            padding: 2px 6px;
            text-align: left;
            border-bottom: 1px solid #ccc;
            white-space: nowrap;
        }

        .tabs-table td {
            padding: 2px 6px;
            border-bottom: 1px solid #eee;
            vertical-align: top;
            word-break: break-all;
        }

        .tabs-table tbody tr:last-child td {
            border-bottom: none;
        }

        .tabs-table tbody tr:hover {
            background-color: #eef;
        }

        .tabs-table th:first-child,
        .tabs-table td:first-child,
        .tabs-table th:nth-child(n+4),
        .tabs-table td:nth-child(n+4) {
            width: 1px;
            white-space: nowrap;
        }

        .tabs-table th:nth-child(2),
        .tabs-table td:nth-child(2) {
            white-space: nowrap;
            max-width: 50em;
            overflow: hidden;
            text-overflow: ellipsis;
        }
    </style>
</head>
<body>
<div id="stats">
    <p>Windows: <span id="window-count">-</span> | Total tabs: <span id="total-tab-count">-</span> | Current window tabs: <span id="current-window-tab-count">-</span></p>
</div>
<div id="windows-list">
    <h3>Windows</h3>
    <div id="windows-table-wrapper">
        <table id="windows-table">
            <thead>
                <tr>
                    <th id="sort-title" class="sortable">Title</th>
                    <th id="sort-tabs" class="sortable">Tabs</th>
                    <th id="sort-status" class="sortable">Status</th>
                    <th></th>
                </tr>
            </thead>
            <tbody id="windows-table-body"></tbody>
        </table>
    </div>
</div>
<div id="window-details">
    <h4>Window Details</h4>
    <div id="window-details-content"></div>
</div>
<hr/>
<div id="export-section">
    <button id="export-button">Export Windows Data</button>
</div>
<div id="minimize-all-windows-section">
    <button id="minimize-all-windows-button">Minimize All Windows</button>
</div>
<div id="unload-all-tabs-section">
    <button id="unload-all-tabs-button">Unload All Tabs</button>
</div>
<div id="refresh-appearance-section">
    <button id="refresh-appearance-button">Refresh Window Titles</button>
</div>
<script async src="manager.js" type="module"></script>
</body>
</html>
