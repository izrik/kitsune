<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kitsune pop-up page</title>
    <meta charset="utf-8"/>
    <style>
        body {
            min-width: 300px;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
    </style>
</head>
<body>
<form id="popup-form" autocomplete="off">
    <p>Set the window title:
        <span id="btn-settings" style="float:right; cursor: pointer;">
            ️<img alt="Settings" title="Settings" src="/icons/settings.png"/>
        </span>
    </p>
    <input id="user-window-title-input" type="text" autofocus/>
    <input id="submit" type="submit" value="OK"/>
</form>
<script async src="popup.js" type="module"></script>
</body>
</html>
