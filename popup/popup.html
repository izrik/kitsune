<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kitsune pop-up page</title>
    <meta charset="utf-8"/>
    <style>
        #windows-list-items {
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #ccc;
            padding: 8px;
            margin: 0;
            background-color: #f9f9f9;
        }

        #windows-list-items li {
            margin: 4px 0;
            padding: 2px;
            list-style-type: none;
        }

        body {
            min-width: 300px;
            font-family: Arial, sans-serif;
            font-size: 12px;
        }
    </style>
</head>
<body>
<form id="popup-form" autocomplete="off">
    <p>Set the window title:</p>
    <input id="user-window-title-input" type="text" autofocus/>
    <input id="submit" type="submit" value="OK"/>
</form>
<hr/>
<div id="stats">
    <p>Windows: <span id="window-count">-</span> | Total tabs: <span id="total-tab-count">-</span> | Current window tabs: <span id="current-window-tab-count">-</span></p>
</div>
<div id="windows-list">
    <h3>Open Windows:</h3>
    <ul id="windows-list-items"></ul>
</div>
<script async src="popup.js" type="module"></script>
</body>
</html>
