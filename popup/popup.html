<!DOCTYPE html>
<html lang="en">
<head>
    <title>Kitsune pop-up page</title>
    <meta charset="utf-8"/>
</head>
<body>
<div id="stats">
    <p>Windows: <span id="window-count">-</span> | Total tabs: <span id="total-tab-count">-</span> | Current window tabs: <span id="current-window-tab-count">-</span></p>
</div>
<form id="popup-form" autocomplete="off">
    <p>Set the window title:</p>
    <input id="user-window-title-input" type="text" autofocus/>
    <input id="submit" type="submit" value="OK"/>
</form>
<script async src="popup.js" type="module"></script>
</body>
</html>
